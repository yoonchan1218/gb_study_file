<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>training-program attach result capture</title>
  <style>
    :root {
      --brand: #006e3f;
      --line: #e8e8e8;
      --muted: #666;
    }

    * {
      box-sizing: border-box;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    }

    html, body {
      margin: 0;
      width: 1600px;
      height: 1200px;
      overflow: hidden;
      background: #eef2f4;
    }

    .canvas {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }

    .apply-modal {
      width: 480px;
      border-radius: 16px;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
    }

    .page-content {
      padding: 24px;
    }

    .apply-job-info {
      margin-bottom: 24px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .job-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.45;
      color: #222;
    }

    .job-meta {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .job-badge {
      padding: 4px 8px;
      border-radius: 4px;
      background: #f5f5f5;
      color: var(--muted);
      font-size: 12px;
    }

    .job-description {
      margin: 0;
      font-size: 14px;
      color: #333;
    }

    .form-section {
      margin-bottom: 18px;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .section-title {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }

    .resume-info,
    .contact-info {
      padding: 16px;
    }

    .resume-tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--brand);
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      margin-right: 8px;
    }

    .resume-name {
      font-size: 14px;
      font-weight: 500;
      color: #333;
    }

    .resume-date,
    .contact-label {
      font-size: 12px;
      color: #999;
    }

    .contact-row {
      display: flex;
      gap: 12px;
      padding: 10px 0;
    }

    .attached-files-list {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .attached-file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .attached-file-info {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .attached-file-icon {
      width: 32px;
      height: 32px;
      flex: 0 0 32px;
      border-radius: 6px;
      background: var(--brand);
      position: relative;
    }

    .attached-file-icon::before {
      content: "📄";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .attached-file-name {
      margin: 0 0 2px;
      font-size: 13px;
      font-weight: 600;
      color: #333;
    }

    .attached-file-meta {
      margin: 0;
      font-size: 11px;
      color: #999;
    }

    .attached-file-delete {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #e8e8e8;
      position: relative;
    }

    .attached-file-delete::before,
    .attached-file-delete::after {
      content: "";
      position: absolute;
      top: 11px;
      left: 7px;
      width: 10px;
      height: 2px;
      background: #666;
    }

    .attached-file-delete::before {
      transform: rotate(45deg);
    }

    .attached-file-delete::after {
      transform: rotate(-45deg);
    }

    .button-grid {
      padding: 16px;
    }

    .button-item {
      width: 100%;
      padding: 14px;
      border: 1px dashed #ddd;
      border-radius: 8px;
      background: #fafafa;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .page-footer {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--line);
    }

    .footer-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      background: #7ba882;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="apply-modal">
      <div class="page-content">
        <div class="apply-job-info">
          <h1 class="job-title">[부산 중구] 조리사(셰프) 정규직/파트타이머 채용</h1>
          <div class="job-meta">
            <span class="job-badge">지원분야</span>
            <p class="job-description">요리사, 조리사, 셰프·주방장</p>
          </div>
        </div>

        <div class="form-section">
          <div class="section-header">
            <p class="section-title">자기소개서</p>
          </div>
          <div class="resume-info">
            <div>
              <span class="resume-tag">기본</span>
              <span class="resume-name">맡은 일에 최선을 다하는 알바생 입니다.</span>
            </div>
            <div class="resume-date">2026.01.29 저장</div>
          </div>
        </div>

        <div class="form-section">
          <div class="section-header">
            <p class="section-title">첨부파일</p>
          </div>
          <div class="attached-files-list">
            <div class="attached-file-item">
              <div class="attached-file-info">
                <div class="attached-file-icon"></div>
                <div>
                  <p class="attached-file-name">portfolio_self_intro.pdf</p>
                  <p class="attached-file-meta">자기소개서 · 1.2MB</p>
                </div>
              </div>
              <div class="attached-file-delete"></div>
            </div>
          </div>
          <div class="button-grid">
            <div class="button-item">파일 추가</div>
          </div>
        </div>

        <div class="form-section">
          <div class="section-header">
            <p class="section-title">연락처</p>
          </div>
          <div class="contact-info">
            <div class="contact-row">
              <div class="contact-label">휴대폰</div>
              <div>010-1234-5678</div>
            </div>
            <div class="contact-row">
              <div class="contact-label">이메일</div>
              <div>example@gmail.com</div>
            </div>
          </div>
        </div>
      </div>

      <div class="page-footer">
        <div class="footer-btn">지원하기</div>
      </div>
    </div>
  </div>
</body>
</html>
