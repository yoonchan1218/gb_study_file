<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모듈화 실습 01</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 테이블 태그를 사용해서 게시글 목록 화면을 구현한다. -->
    <!-- 게시글 전체 목록 중, 10개만 가져온다. -->
    <!-- 게시글 정보는 userId, title, body를 사용한다. -->
    <!-- 이 때 게시글 제목 또는 내용이 넘칠 경우 ... 스타일로 처리해준다. -->
    <!-- <button id="get-posts">게시글 불러오기</button> -->
    <div id="button-wrap">
        <input type="text" placeholder="페이지 번호">
        <button id="get-posts">게시글 불러오기</button>
    </div>
    <table class="posts">
        <thead>
            <tr>
                <th>번호</th>
                <th>회원 번호</th>
                <th>제목</th>
                <th>내용</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</body>
<script src="service.js"></script>
<script src="layout.js"></script>
<script src="event.js"></script>
</html>
