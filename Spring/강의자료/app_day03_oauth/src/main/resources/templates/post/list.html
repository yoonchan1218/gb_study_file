<!DOCTYPE html>
<html lang="ko" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/common/layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판</title>
    <link rel="stylesheet" href="/css/header/header.css">
    <link rel="stylesheet" href="/css/post/list.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="/js/member/login/service.js"></script>
    <script src="/js/post/list/event.js"></script>
</head>
<body>
<th:block layout:fragment="content">
<main>
    <div class="container">
        <div class="board-top">
            <h1 class="board-title">게시판</h1>
        </div>
        <form action="/post/list/1">
            <div class="search-bar">
                <label>
                    <select name="category" class="search-select">
                        <option value="all">전체</option>
                        <option value="title">제목</option>
                        <option value="content">내용</option>
                        <option value="writer">작성자</option>
                    </select>
                </label>
                <label>
                    <input type="text" name="keyword" class="search-input" placeholder="검색어를 입력하세요">
                </label>
                <button class="btn-search">검색</button>
            </div>
        </form>
        <div class="board">
            <table class="board-table">
                <thead>
                <tr>
                    <th class="th-num">번호</th>
                    <th class="th-title">제목</th>
                    <th class="th-writer">작성자</th>
                    <th class="th-date">작성일</th>
                    <th class="th-view">조회</th>
                </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>테스트 제목</td>
                        <td>테스트</td>
                        <td>1일 전</td>
                        <td>3</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <!-- 이전 그룹 버튼 -->
            <a class="page-num">&lt;</a>

            <!-- 페이지 번호 -->
                <a class="page-num">1</a>
                <a class="page-num">2</a>
                <a class="page-num">3</a>
                <a class="page-num">4</a>
                <a class="page-num">5</a>
            <!-- 다음 그룹 버튼 -->
            <a class="page-num">&gt;</a>
        </div>
    </div>
</main>
</th:block>
</body>
</html>
